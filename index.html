<!DOCTYPE html>
<html lang="ta">
<head>
  <meta charset="utf-8">
  <title>Spot Photography B.Nadur </title>
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  
  <style>
    /* ஸ்கிரீன் முழுவதையும் பயன்படுத்த இந்த ஸ்டைல் உதவும் */
    body, html { 
      margin: 0; 
      padding: 0; 
      height: 100%; 
      width: 100%;
      overflow: hidden; /* ஸ்க்ரோல் பார் தேவையற்ற இடங்களைத் தவிர்க்க */
      background-color: #ffffff;
    }

    /* Iframe-ஐ போன் அளவுக்கு தகுந்த மாதிரி மாற்றும் வசதி */
    .container {
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      right: 0;
      width: 100%;
      height: 100%;
    }

    iframe { 
      width: 100%; 
      height: 100%; 
      border: none; 
    }
  </style>
</head>
<body>

  <div class="container">
    <iframe src=" https://script.google.com/macros/s/AKfycbxmRu3eZMaVgLwVV_iNuc2hMLLqKAq2Nsyl7v8ztkVNQAevpbTDxuuIHHQ1nG--uyph/exec" 
            allow="geolocation; microphone; camera; midi; vr; accelerometer; gyroscope; payment; ambient-light-sensor; encrypted-media; usb" 
            allowfullscreen>
    </iframe>
  </div>

</body>
</html>
